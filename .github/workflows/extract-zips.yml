name: Extract all zip files

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract zips into matching folders
        run: |
          find . -name "*.zip" -not -path "./.git/*" | while read -r zipfile; do
            dir="${zipfile%.zip}"
            echo "Extraction: $zipfile -> $dir"
            mkdir -p "$dir"
            unzip -o "$zipfile" -d "$dir"
            rm "$zipfile"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Extract zip files into folders" || echo "Rien à committer"
          git push
